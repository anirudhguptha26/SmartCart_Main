<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SmartCart Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo"><div class="brand">🛒 Smart<span>Cart</span></div></div>
        <div style="text-align:center;margin-bottom:1.25rem;">
            <div style="font-size:2.5rem;">✉️</div>
            <h2 class="auth-title" style="margin-bottom:0.25rem;">Reset Password</h2>
            <p style="font-size:0.82rem;color:var(--gray-500);">Enter the OTP and choose a new password.</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
        {% endwith %}
        <form method="POST" action="/admin-reset-password">
            <div class="form-group">
                <label class="form-label">OTP Code <span class="required">*</span></label>
                <input type="text" name="otp" class="form-control" placeholder="6-digit OTP" maxlength="6" required style="letter-spacing:6px;font-size:1.2rem;text-align:center;">
            </div>
            <div class="form-group">
                <label class="form-label">New Password <span class="required">*</span></label>
                <input type="password" name="password" class="form-control" placeholder="Min 8 characters" minlength="8" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password <span class="required">*</span></label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-amazon btn-full btn-lg">Reset Password</button>
        </form>
        <div class="auth-footer">
            <a href="/admin-forgot-password" style="color:var(--flipkart-blue);">Resend OTP</a> · <a href="/admin-login" style="color:var(--flipkart-blue);">Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
