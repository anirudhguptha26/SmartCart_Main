{% extends "admin/base_admin.html" %}
{% block title %}Edit {{ product.name }}{% endblock %}
{% block page_title %}Edit Product{% endblock %}

{% block content %}
<div style="max-width:720px;">
    <div class="card">
        <div class="card-header">
            <span class="card-title">✏️ Edit: {{ product.name }}</span>
            <a href="/admin/item-list" class="btn btn-outline btn-sm">← Back</a>
        </div>
        <div class="card-body">
            <form method="POST" action="/admin/update-item/{{ product.product_id }}" enctype="multipart/form-data">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Product Name <span class="required">*</span></label>
                        <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category <span class="required">*</span></label>
                        <input type="text" name="category" class="form-control" value="{{ product.category }}" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Description <span class="required">*</span></label>
                    <textarea name="description" class="form-control" required>{{ product.description }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Price (₹) <span class="required">*</span></label>
                        <input type="number" step="0.01" min="0" name="price" class="form-control" value="{{ product.price }}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Stock Quantity <span class="required">*</span></label>
                        <input type="number" min="0" name="quantity" class="form-control" value="{{ product.quantity }}" required>
                        <span class="form-hint">Adjust stock level here</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Current Image</label>
                    <div style="margin-bottom:0.75rem;">
                        <img src="/static/uploads/product_images/{{ product.image }}" style="height:110px;object-fit:contain;border-radius:var(--radius-xs);border:1px solid var(--gray-300);background:var(--gray-50);padding:0.5rem;">
                    </div>
                    <label class="form-label">Replace Image <span style="font-size:0.75rem;font-weight:400;color:var(--gray-500);">(leave empty to keep current)</span></label>
                    <label class="file-input-wrapper" for="new_img">
                        <input type="file" name="image" id="new_img" accept="image/*">
                        <div class="file-icon">🔄</div>
                        <div class="file-label">Click to upload new image<br><strong>or leave empty to keep current</strong></div>
                    </label>
                </div>

                <div style="display:flex;gap:0.6rem;margin-top:1rem;">
                    <button type="submit" class="btn btn-primary btn-lg">💾 Update Product</button>
                    <a href="/admin/item-list" class="btn btn-outline btn-lg">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
