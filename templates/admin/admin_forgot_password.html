<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SmartCart Admin</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card fade-in">
        <div class="auth-logo"><div class="brand">🛒 Smart<span>Cart</span></div></div>
        <div style="text-align:center;margin-bottom:1.25rem;">
            <div style="font-size:2.5rem;">🔐</div>
            <h2 class="auth-title" style="margin-bottom:0.25rem;">Forgot Password?</h2>
            <p style="font-size:0.82rem;color:var(--gray-500);">Enter your admin email and we'll send you a reset OTP.</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
        {% endwith %}
        <form method="POST" action="/admin-forgot-password">
            <div class="form-group">
                <label class="form-label">Admin Email <span class="required">*</span></label>
                <input type="email" name="email" class="form-control" placeholder="admin@example.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-amazon btn-full btn-lg">Send Reset OTP</button>
        </form>
        <div class="auth-footer"><a href="/admin-login" style="color:var(--flipkart-blue);">← Back to Login</a></div>
    </div>
</div>
</body>
</html>
