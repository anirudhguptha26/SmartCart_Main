<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SmartCart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:#f0f0f0;">
<div style="background:var(--amazon-navy);padding:0.75rem;display:flex;align-items:center;justify-content:center;">
    <a href="/" style="font-size:1.5rem;font-weight:900;color:white;text-decoration:none;">🛒 Smart<span style="color:var(--amazon-orange);">Cart</span></a>
</div>
<div class="auth-page" style="padding:1.5rem 1rem;">
    <div class="auth-card fade-in">
        <div style="text-align:center;margin-bottom:1.25rem;"><div style="font-size:2.5rem;">🔐</div></div>
        <h2 class="auth-title">Password assistance</h2>
        <p style="font-size:0.82rem;color:var(--gray-500);margin-bottom:1rem;">Enter the email address associated with your SmartCart account.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
        {% endwith %}
        <form method="POST" action="/user-forgot-password">
            <div class="form-group">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control" required autofocus>
            </div>
            <button type="submit" class="btn btn-amazon btn-full btn-lg">Continue</button>
        </form>
        <div class="auth-footer"><a href="/user-login" style="color:var(--flipkart-blue);">← Back to Login</a></div>
    </div>
</div>
</body>
</html>
