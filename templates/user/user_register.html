<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SmartCart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #eaeded;
        }

        .auth-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-shadow: 0 2px 10px rgba(0,0,0,.1);
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: #131921;
        }

        .brand span {
            color: #ff9900;
        }

        .auth-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: #111;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: #111;
            margin-bottom: 0.4rem;
        }

        .form-control {
            width: 100%;
            padding: 0.75rem 0.75rem;
            border: 1px solid #bbb;
            border-radius: 3px;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #ff9900;
            box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.1);
        }

        .btn-signup {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(to bottom, #f7dfa5, #f0c14b);
            color: #111;
            border: 1px solid #a88734;
            border-radius: 3px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
            transition: background 0.2s;
        }

        .btn-signup:hover {
            background: linear-gradient(to bottom, #f5d78e, #edb932);
        }

        .login-section {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .login-section p {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 1rem;
        }

        .btn-login {
            width: 100%;
            padding: 0.7rem;
            background: white;
            color: #0066cc;
            border: 1.5px solid #0066cc;
            border-radius: 3px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-login:hover {
            background: #f0f5ff;
        }

        .alert {
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 600px) {
            .auth-card {
                max-width: 100%;
                padding: 1.5rem;
            }

            .auth-title {
                font-size: 1.1rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="brand">🛒 Smart<span>Cart</span></div>
            </div>

            <h2 class="auth-title">Create Account</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="/user-register">
                <div class="form-group">
                    <label class="form-label">Full Name <span class="required">*</span></label>
                    <input type="text" name="name" class="form-control" placeholder="Enter your full name" required autofocus>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address <span class="required">*</span></label>
                    <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password <span class="required">*</span></label>
                    <input type="password" name="password" class="form-control" placeholder="At least 6 characters" minlength="6" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <input type="tel" name="phone" class="form-control" placeholder="10-digit mobile number (optional)">
                </div>

                <div class="form-group">
                    <label class="form-label">Address</label>
                    <textarea name="address" class="form-control" placeholder="Your address (optional)" style="resize: vertical; min-height: 80px;"></textarea>
                </div>

                <button type="submit" class="btn-signup">Create Account</button>
            </form>

            <div class="login-section">
                <p>Already have an account?</p>
                <a href="/user-login" class="btn-login">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    {% include 'footer_auth.html' %}
</body>
</html>
