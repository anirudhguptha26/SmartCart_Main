<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SmartCart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:#f0f0f0;">
<div style="background:var(--amazon-navy);padding:0.75rem;display:flex;align-items:center;justify-content:center;">
    <a href="/" style="font-size:1.5rem;font-weight:900;color:white;text-decoration:none;">🛒 Smart<span style="color:var(--amazon-orange);">Cart</span></a>
</div>
<div class="auth-page" style="padding:1.5rem 1rem;">
    <div class="auth-card fade-in">
        <div style="text-align:center;margin-bottom:1.25rem;"><div style="font-size:2.5rem;">✉️</div></div>
        <h2 class="auth-title">Reset Password</h2>
        <p style="font-size:0.82rem;color:var(--gray-500);margin-bottom:1rem;">Enter the OTP sent to your email and choose a new password.</p>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}<div class="alert alert-{{ category }}">{{ message }}</div>{% endfor %}
        {% endwith %}
        <form method="POST" action="/user-reset-password">
            <div class="form-group">
                <label class="form-label">OTP Code</label>
                <input type="text" name="otp" class="form-control" placeholder="6-digit OTP" maxlength="6" required style="letter-spacing:6px;font-size:1.2rem;text-align:center;">
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="form-control" placeholder="Min 6 characters" minlength="6" required>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn btn-amazon btn-full btn-lg">Reset Password</button>
        </form>
        <div class="auth-footer">
            <a href="/user-forgot-password" style="color:var(--flipkart-blue);">Resend OTP</a> · <a href="/user-login" style="color:var(--flipkart-blue);">Back to Login</a>
        </div>
    </div>
</div>
</body>
</html>
